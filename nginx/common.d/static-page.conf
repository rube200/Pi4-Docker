    location ~* /robots\.txt$ {
        alias /usr/share/nginx/html/robots.txt;
        expires 1y;
        access_log off;
        log_not_found off;
    }

    location ~* /favicon\.ico$ {
        alias /usr/share/nginx/html/favicon.ico;
        expires 1y;
        access_log off;
        log_not_found off;
    }
