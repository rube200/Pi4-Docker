    #SECURITY HEADER
    add_header Content-Security-Policy 'default-src \'self\'; connect-src \'self\' https:; img-src \'self\' data: https:; script-src-elem \'self\' \'unsafe-inline\'; style-src https: \'self\' \'unsafe-inline\'; upgrade-insecure-requests';
    add_header Cross-Origin-Embedder-Policy 'require-corp';
    add_header Cross-Origin-Opener-Policy 'same-origin';
    add_header Cross-Origin-Resource-Policy 'same-origin';
    add_header Permissions-Policy 'interest-cohort=()';
    add_header Referrer-Policy 'same-origin';
    add_header Set-Cookie 'Path=/; HttpOnly; Secure';
    add_header Strict-Transport-Security 'max-age=31536000; includeSubDomains; preload';
    add_header Upgrade-Insecure-Requests '1';
    add_header X-Content-Type-Options 'nosniff';
    add_header X-Frame-Options 'SAMEORIGIN';
    add_header X-Permitted-Cross-Domain-Policies 'none';
    add_header X-XSS-Protection '1';


    include /etc/nginx/common.d/static-page.conf;
