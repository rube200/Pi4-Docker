#!/usr/sbin/nft -f

# Loads an equivalent nftables ruleset (inet - supports both IPv4 and IPv6).

flush ruleset

table inet filter {
  # Base trusted network (IPv4)
  set trusted_base {
    type ipv4_addr; flags interval;
    elements = { 10.13.13.0/24, 192.168.0.0/16 }
  }

  # Base trusted network (IPv6)
  set trusted_base6 {
    type ipv6_addr; flags interval;
    elements = { fd13:13:13::/64, fe80::/10 }
  }

  chain attack {
    limit rate 2/minute log prefix "[ATTACK] "
    drop
  }

  chain dns_leak {
    log prefix "[DNS LEAK] "
    drop
  }

  chain protection_ddos {
    limit rate 5/second accept
    log prefix "[DDOS] "
    drop
  }

  chain protection_dns {
    limit rate 300/minute accept
    log prefix "[DNS] "
    drop
  }

  chain protection_wireguard {
    limit rate 12/minute accept
    log prefix "[WIREGUARD] "
    drop
  }

  chain input {
    type filter hook input priority filter; policy accept;

    # Early drops and accepts
    ct state invalid drop
    ct state established,related accept

    # Accept local network
    iifname "lo" accept
    iifname { "br-*", "docker*" } ip saddr != 10.13.13.0/30 accept
    iifname { "br-*", "docker*" } ip6 saddr != fd13:13:13::/126 accept

    udp dport 40777 drop

    # DHCP
    ip saddr 172.28.0.3 udp sport 67 accept
    udp dport 67 accept

    # SSH
    ip saddr @trusted_base ip saddr != 10.13.13.0/24 tcp dport 22 accept
    ip6 saddr @trusted_base6 ip6 saddr != fd13:13:13::/64 tcp dport 22 accept
    ip saddr 10.13.13.0/30 tcp dport 22 accept
    ip6 saddr fd13:13:13::/126 tcp dport 22 accept
    tcp dport 22 drop

    # HTTP/HTTPS
    ip saddr @trusted_base tcp dport { 80, 443 } accept
    ip6 saddr @trusted_base6 tcp dport { 80, 443 } accept
    tcp dport { 80, 443 } jump protection_ddos

    # DNS
    ip saddr @trusted_base tcp dport 53 accept
    ip6 saddr @trusted_base6 tcp dport 53 accept
    tcp dport 53 jump protection_dns
    ip saddr @trusted_base udp dport 53 accept
    ip6 saddr @trusted_base6 udp dport 53 accept
    udp dport 53 jump protection_dns

    # DNS over HTTPS/TLS
    ip saddr @trusted_base tcp dport { 440, 853 } accept
    ip6 saddr @trusted_base6 tcp dport { 440, 853 } accept
    tcp dport { 440, 853 } jump protection_dns

    # WireGuard
    udp dport 51820 jump protection_wireguard

    # Log and drop remaining
    log prefix "[FIREWALL-IN] " group 0
    drop
  }

  chain output {
    type filter hook output priority filter; policy accept;

    # Accept local network
    oifname "lo" accept
    oifname { "br-*", "docker*" } ip daddr != 10.13.13.0/30 accept
    oifname { "br-*", "docker*" } ip6 daddr != fd13:13:13::/126 accept

    # DHCP
    udp dport 67 ip daddr 172.28.0.3 accept
    udp sport 67 udp dport 68 accept

    # SSH
    ip daddr @trusted_base ip daddr != 10.13.13.0/24 tcp sport 22 accept
    ip6 daddr @trusted_base6 ip6 daddr != fd13:13:13::/64 tcp sport 22 accept
    ip daddr 10.13.13.0/30 tcp sport 22 accept
    ip6 daddr fd13:13:13::/126 tcp sport 22 accept
    tcp sport 22 drop

    # DNS
    ip daddr @trusted_base tcp sport 53 accept
    ip6 daddr @trusted_base6 tcp sport 53 accept
    tcp sport 53 jump dns_leak
    ip daddr @trusted_base udp sport 53 accept
    ip6 daddr @trusted_base6 udp sport 53 accept
    udp sport 53 jump dns_leak
  }

  chain forward {
    type filter hook forward priority filter; policy accept;

    # Early drops and accepts
    ct state invalid drop
    ct state established,related accept

    # Allow Docker bridge networks to forward traffic
    iifname { "br-*", "docker*" } accept
    oifname { "br-*", "docker*" } accept

    # Allow forwarding for trusted networks
    ip saddr @trusted_base accept
    ip6 saddr @trusted_base6 accept
    ip daddr @trusted_base accept
    ip6 daddr @trusted_base6 accept
  }
}

table inet nat {
  chain prerouting {
    type nat hook prerouting priority -100; policy accept;

    udp dport 182 redirect to :51820
  }

  chain postrouting {
    type nat hook postrouting priority 100; policy accept;

    # Masquerade WireGuard (IPv4)
    counter packets 0 bytes 0 ip saddr 10.13.13.0/24 oifname { "eth*", "en*" } masquerade
    # Masquerade WireGuard (IPv6)
    counter packets 0 bytes 0 ip6 saddr fd13:13:13::/64 oifname { "eth*", "en*" } masquerade
  }
}