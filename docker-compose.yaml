services:
  unbound:
    build: ./unbound-docker/
    container_name: unbound
    hostname: 'Unbound-Docker'
    ports:
      - "5335:5335/udp"
      - "5335:5335/tcp"
    networks:
      services_network:
        ipv4_address: 172.28.0.2
    healthcheck:
      test: ["CMD", "dig", "+ad", "+short", "dnssec.works", "@127.0.0.1", "-p", "5335"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  pihole:
    container_name: pihole
    depends_on:
      unbound:
        condition: service_healthy
    image: pihole/pihole:2026.04.0
    hostname: 'PiHole-Docker'
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "44353:44353/tcp"
    environment:
      TZ: 'Europe/Lisbon'
      FTLCONF_dns_upstreams: '172.28.0.2#5335'
      FTLCONF_dns_listeningMode: 'ALL'
      FTLCONF_dns_piholePTR: 'HOSTNAMEFQDN'
      FTLCONF_dns_replyWhenBusy: 'BLOCK'
      FTLCONF_dns_domainNeeded: true
      FTLCONF_dns_expandHosts: true
      FTLCONF_dns_dnssec: true
      FTLCONF_dns_blocking_active: true
      FTLCONF_dns_rateLimit_count: 1200
      FTLCONF_misc_dnsmasq_lines: 'shared-network=eth0,${PIHOLE_LAN_IP};dhcp-option=option:dns-server,${PIHOLE_LAN_IP}'
      FTLCONF_webserver_domain: ${SERVER_HOSTNAME}
      FTLCONF_webserver_port: +44353s
      FTLCONF_webserver_session_timeout: 2592000
      FTLCONF_webserver_tls_validity: 365
    volumes:
      - '/etc/pihole:/etc/pihole'
    cap_add:
      - NET_ADMIN
      - NET_BIND_SERVICE
      - NET_RAW
      - SYS_NICE
    networks:
      services_network:
        ipv4_address: 172.28.0.3
    healthcheck:
      test: ["CMD", "dig", "+ad", "+short", "dnssec.works", "@127.0.0.1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  dhcp-relay:
    container_name: dhcp-relay
    depends_on:
      pihole:
        condition: service_healthy
    image: homeall/dhcphelper:2026.04.06
    privileged: true
    environment:
      IP: 172.28.0.3
      TZ: 'Europe/Lisbon'
    cap_add:
      - NET_ADMIN
    network_mode: host
    restart: unless-stopped

  doh:
    build: ./doh-docker/
    container_name: doh
    depends_on:
      pihole:
        condition: service_healthy
    hostname: 'DoH-Docker'
    ports:
      - "3000:3000/tcp"
    environment:
      - SERVER_HOSTNAME=${SERVER_HOSTNAME}
      - DOH_UPSTREAM_DNS=${DOH_UPSTREAM_DNS:-172.28.0.3:53}
      - DOH_PATH_PREFIX=${DOH_PATH_PREFIX:-consulta-dns}
      - DOH_PUBLIC_PORT=${DOH_PUBLIC_PORT:-440}
    networks:
      services_network:
        ipv4_address: 172.28.0.4
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  nginx:
    build: ./nginx/
    container_name: nginx
    depends_on:
      doh:
        condition: service_healthy
      pihole:
        condition: service_healthy
    hostname: 'Nginx-Docker'
    ports:
      - "80:80/tcp"
      - "443:443/tcp"
      - "440:440/tcp"
      - "853:853/tcp"
    environment:
      - DOH_PATH_PREFIX=${DOH_PATH_PREFIX:-consulta-dns}
      - SERVER_HOSTNAME=${SERVER_HOSTNAME}
      - DNS_API=${DNS_API}
    volumes:
      - '/etc/letsencrypt:/etc/letsencrypt'
      - '/var/www/certbot:/var/www/certbot'
    networks:
      services_network:
        ipv4_address: 172.28.0.5
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  wireguard:
    build: ./wireguard-docker/
    container_name: wireguard
    depends_on:
      pihole:
        condition: service_healthy
    hostname: 'Wireguard-Docker'
    ports:
      - "51820:51820/udp"
    environment:
      - SERVER_HOSTNAME=${SERVER_HOSTNAME}
      - LOCAL_DNS_IP=${LOCAL_DNS_IP:-172.28.0.3}
      - LOCAL_ALLOWLIST=${LOCAL_ALLOWLIST:-172.28.0.2,172.28.0.3,172.28.0.4,172.28.0.5}
      - WG_EGRESS_IFACE=${WG_EGRESS_IFACE:-eth0}
    volumes:
      - '/etc/wireguard:/etc/wireguard'
      - '/lib/modules:/lib/modules:ro'
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    networks:
      services_network:
        ipv4_address: 172.28.0.6
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.forwarding=1
    restart: unless-stopped

networks:
  services_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
    driver_opts:
      com.docker.network.driver.mtu: ${NETWORK_MTU:-1500}